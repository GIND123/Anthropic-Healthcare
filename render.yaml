services:
  - type: web
    name: anima-healthcare
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: WEB_CONCURRENCY
        value: 1
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
